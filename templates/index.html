<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能教室测控系统</title>
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<style>
:root {
  /* ── 新设计令牌 ── */
  --bg-page: #f6f7f9;
  --bg-card: #ffffff;
  --bg-subtle: #f2f4f7;
  --border: #e5e7eb;
  --border-strong: #d0d5dd;
  --text-main: #111827;
  --text-muted: #667085;
  --text-subtle: #98a2b3;
  --accent: #3f596d;
  --accent-hover: #334a5c;
  --success: #2e7d32;
  --success-bg: #e8f5e9;
  --danger: #c62828;
  --danger-bg: #ffebee;
  --warning: #b7791f;
  --warning-bg: #fff8e1;
  --info: #1565c0;
  --info-bg: #e3f2fd;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
  --radius-card: 12px;
  --radius-btn: 8px;
  --radius-input: 8px;
  --radius-badge: 6px;
  --radius-video: 12px;
  /* ── 向后兼容别名 ── */
  --bg: var(--bg-page);
  --text: var(--text-main);
  --text-dim: var(--text-muted);
  --text-light: var(--text-subtle);
  --green: var(--success);
  --green-light: var(--success-bg);
  --red: var(--danger);
  --red-light: var(--danger-bg);
  --amber: var(--warning);
  --purple: var(--accent);
  --purple-light: #f0f4f8;
  --shadow: var(--shadow-card);
  --radius: var(--radius-card);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;overflow:auto;}
body{background:var(--bg-page);color:var(--text-main);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;display:flex;flex-direction:column;font-size:13px;line-height:1.45;min-height:100vh;}

/* Header */
.header{background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.header-left{display:flex;align-items:center;gap:8px;}
.logo{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;}
.header-title{font-size:15px;font-weight:600;}
.header-sub{font-size:10px;color:var(--text-light);}
.header-right{display:flex;align-items:center;gap:12px;}
.sys-clock{font-size:12px;font-weight:500;font-variant-numeric:tabular-nums;}
.mode-toggle{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.mode-btn{padding:4px 14px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:transparent;color:var(--text-dim);transition:all .2s;min-height:32px;}
.mode-btn.active-auto{background:var(--accent);color:#fff;}
.mode-btn.active-manual{background:var(--warning);color:#fff;}
.mode-btn:hover:not(.active-auto):not(.active-manual){background:var(--bg-subtle);color:var(--text-main);}

/* Main */
.main-layout{flex:1;display:flex;gap:12px;padding:10px 14px;min-height:0;overflow:hidden;align-items:flex-start;justify-content:center;width:min(1600px,100%);margin:0 auto;}

/* Info column (leftmost, narrow, vertical) */
.info-panel{flex:0 0 220px;width:220px;display:flex;flex-direction:column;gap:8px;min-width:0;max-height:calc(100vh - 72px);overflow-y:auto;}
.info-panel::-webkit-scrollbar{width:5px;}
.info-panel::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:2px;}
.info-panel::-webkit-scrollbar-thumb:hover{background:var(--text-subtle);}

/* Video column (middle) */
.left-panel{flex:1 1 0;display:flex;flex-direction:column;gap:8px;min-width:320px;min-height:0;}

.right-panel{flex:0 0 340px;width:340px;max-width:380px;overflow-y:auto;overflow-x:hidden;padding-right:4px;max-height:calc(100vh - 72px);}
.right-panel::-webkit-scrollbar{width:5px;}
.right-panel::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:2px;}
.right-panel::-webkit-scrollbar-thumb:hover{background:var(--text-subtle);}
.right-inner{display:flex;flex-direction:column;gap:10px;padding-bottom:10px;}

/* Card */
.card{background:var(--bg-card);border-radius:var(--radius-card);box-shadow:var(--shadow-card);border:1px solid var(--border);}
.card-header{padding:8px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:transparent;}
.card-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;}
.card-title .icon{font-size:15px;}
.card-badge{font-size:9px;font-weight:500;padding:2px 6px;border-radius:4px;background:var(--bg-subtle);color:var(--text-muted);}
.card-body{padding:10px 12px;}

/* Video */
.video-card{flex:1 1 auto;display:flex;flex-direction:column;min-height:0;}
.video-card .card-body{flex:1 1 auto;display:flex;flex-direction:column;padding:6px;min-height:0;}
.video-container{position:relative;background:#111827;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;width:100%;aspect-ratio:16 / 9;}
.video-container img{display:block;width:100%;height:100%;max-width:100%;object-fit:cover;}
.video-status{position:absolute;top:8px;right:8px;font-size:9px;background:rgba(0,0,0,.6);color:var(--green);padding:2px 8px;border-radius:4px;}

/* Info column cards — compact for narrow column */
.info-panel .card-body{padding:8px 10px;}
.info-panel .person-count .number{font-size:28px;}
.info-panel .data-row{padding:4px 0;}
.info-panel .data-value{font-size:13px;}

/* Data */
.data-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);}
.data-row:last-child{border-bottom:none;}
.data-label{font-size:12px;color:var(--text-dim);}
.data-value{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;}
.data-unit{font-size:10px;color:var(--text-light);margin-left:2px;}

/* Person */
.person-count{text-align:center;padding:6px 0;}
.person-count .number{font-size:36px;font-weight:700;color:var(--text-main);line-height:1;}
.person-count .label{font-size:10px;color:var(--text-light);margin-top:2px;}

/* Buttons */
.btn-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.btn{padding:5px 10px;border:none;border-radius:var(--radius-btn);cursor:pointer;font-size:11px;font-weight:500;transition:all .15s;text-align:center;min-height:32px;display:inline-flex;align-items:center;justify-content:center;gap:4px;}
.btn:active{transform:scale(.96);}
.btn-flex{flex:1;}
.btn-accent{background:var(--accent);color:#fff;}
.btn-accent:hover{background:var(--accent-hover);}
.btn-green{background:var(--green-light);color:var(--green);border:1px solid rgba(46,125,50,.25);}
.btn-red{background:var(--red-light);color:var(--red);border:1px solid rgba(198,40,40,.25);}
.btn-purple{background:var(--purple-light);color:var(--purple);border:1px solid rgba(175,82,222,.25);}
.btn-outline{background:#fff;color:var(--text-dim);border:1px solid var(--border);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm{padding:4px 7px;font-size:10px;}

/* Input */
.input{padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius-input);font-size:12px;background:#fff;color:var(--text);outline:none;min-height:32px;transition:border-color .15s, box-shadow .15s;}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(63,89,109,0.12);}
.input:hover:not(:focus){border-color:var(--border-strong);}
select.input{cursor:pointer;}

/* Checkbox */
.chk-row{display:flex;align-items:center;gap:6px;font-size:12px;padding:4px 0;}
.chk-row input[type="checkbox"]{accent-color:var(--accent);width:14px;height:14px;}

/* IR list */
.cmd-list{max-height:80px;overflow-y:auto;margin-top:4px;}
.cmd-item{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;border-radius:5px;margin-bottom:3px;background:#fff;border:1px solid var(--border);font-size:11px;}
.cmd-btn{padding:2px 6px;border-radius:4px;border:none;cursor:pointer;font-size:9px;font-weight:500;}
.cmd-btn-send{background:var(--accent-light);color:var(--accent);}
.cmd-btn-del{background:var(--red-light);color:var(--red);}

/* Calib */
.calib-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;margin-bottom:4px;}
.calib-row .val{font-weight:600;color:var(--accent);}

/* Inline form */
.inline-form{display:flex;gap:5px;align-items:center;margin-bottom:6px;flex-wrap:wrap;}
.inline-form label{font-size:11px;color:var(--text-dim);white-space:nowrap;flex:0 0 auto;}
.inline-form .input{flex:1;min-width:0;}
.calib-form{gap:4px;}
.calib-form .calib-input{flex:0 0 54px; width:54px; min-width:54px; box-sizing:border-box;}
.calib-form .btn{flex:0 0 auto;}

/* Msg */
.msg{font-size:10px;min-height:14px;margin-top:2px;}
.msg-ok{color:var(--green);}
.msg-err{color:var(--red);}
.msg-warn{color:var(--amber);}

/* Status dot */
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
.status-dot.online{background:var(--green);}
.status-dot.offline{background:var(--text-light);}

/* Section label */
.section-label{font-size:10px;color:var(--text-light);margin-bottom:4px;padding-left:2px;}

/* Responsive: 900-1199px, two-column layout */
@media (max-width: 1199px) and (min-width: 900px) {
  .main-layout { flex-wrap: wrap; }
  .info-panel { flex: 0 0 100%; width: 100%; flex-direction: row; max-height: none; overflow: visible; }
  .info-panel .card { flex: 1; }
  .left-panel { flex: 1 1 0; min-width: 400px; }
  .right-panel { flex: 0 0 340px; width: 340px; max-width: 340px; }
}

/* Responsive: < 900px, single-column layout */
@media (max-width: 899px) {
  .main-layout { flex-direction: column; overflow-y: auto; align-items: stretch; }
  .info-panel { flex-direction: row; flex-wrap: wrap; max-height: none; overflow: visible; width: 100%; }
  .info-panel .card { flex: 1 1 140px; }
  .left-panel { min-width: 0; width: 100%; }
  .right-panel { flex: none; width: 100%; max-width: none; max-height: none; overflow: visible; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">控</div>
    <div><div class="header-title">智能教室测控系统</div><div class="header-sub">网络化测控 · 实时监控</div></div>
  </div>
  <div class="header-right">
    <span class="sys-clock" id="clock">--:--:--</span>
    <span class="status-dot offline" id="wsDot"></span>
    <span id="wsLabel" style="font-size:10px;color:var(--text-light);">连接中</span>
    <div class="mode-toggle">
      <button class="mode-btn active-auto" id="btnAuto" onclick="setMode('AUTO')">自动</button>
      <button class="mode-btn" id="btnManual" onclick="setMode('MANUAL')">手动</button>
    </div>
  </div>
</header>

<div class="main-layout">
  <!-- INFO COLUMN (leftmost, vertical stack) -->
  <div class="info-panel">
    <div class="card">
      <div class="card-header"><div class="card-title"><span class="icon">👤</span> 人员</div><span class="card-badge" id="modelBadge">yolov8n</span></div>
      <div class="card-body"><div class="person-count"><div class="number" id="personCount">0</div><div class="label">检测人数</div></div></div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title"><span class="icon">🌡️</span> 环境</div></div>
      <div class="card-body">
        <div class="data-row"><span class="data-label">温度</span><span><span class="data-value" id="temperature">--</span><span class="data-unit">°C</span></span></div>
        <div class="data-row"><span class="data-label">湿度</span><span><span class="data-value" id="humidity">--</span><span class="data-unit">%</span></span></div>
        <div class="data-row"><span class="data-label">光照</span><span><span class="data-value" id="lux">--</span><span class="data-unit">lux</span></span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title"><span class="icon">📊</span> 性能</div></div>
      <div class="card-body">
        <div class="data-row"><span class="data-label">帧率</span><span><span class="data-value" id="streamFps">--</span><span class="data-unit">fps</span></span></div>
        <div class="data-row"><span class="data-label">推理</span><span><span class="data-value" id="inferMs">--</span><span class="data-unit">ms</span></span></div>
      </div>
    </div>
  </div>

  <!-- VIDEO COLUMN (middle) -->
  <div class="left-panel">
    <div class="card video-card">
      <div class="card-header">
        <div class="card-title"><span class="icon">📹</span> 实时视频</div>
        <div class="card-badge" id="videoStatus">● LIVE</div>
      </div>
      <div class="card-body"><div class="video-container"><img id="videoImg" alt="视频流"></div></div>
    </div>
  </div>

  <!-- RIGHT (scrollable) -->
  <div class="right-panel">
    <div class="right-inner">

    <!-- Servo -->
    <div class="card">
      <div class="card-header"><div class="card-title"><span class="icon">⚙️</span> 舵机控制</div></div>
      <div class="card-body">
        <div class="btn-row" style="margin-bottom:8px;">
          <button class="btn btn-green btn-flex" onclick="servoAction('on')">💡 开灯</button>
          <button class="btn btn-red btn-flex" onclick="servoAction('off')">🌙 关灯</button>
        </div>
        <div class="calib-row"><span>当前角度</span><span class="val" id="servoAngle">90°</span></div>
        <input type="range" id="servoSlider" min="0" max="180" value="90" style="width:100%;accent-color:var(--accent);margin-bottom:6px;"
          oninput="document.getElementById('servoAngle').textContent=this.value+'°'" onchange="servoMove(this.value)">
        <div class="btn-row">
          <button class="btn btn-outline btn-sm" onclick="servoNudge(-5)">-5°</button>
          <button class="btn btn-outline btn-sm" onclick="servoNudge(-1)">-1°</button>
          <button class="btn btn-outline btn-sm" onclick="servoNudge(1)">+1°</button>
          <button class="btn btn-outline btn-sm" onclick="servoNudge(5)">+5°</button>
          <span style="width:1px;height:16px;background:var(--border);margin:0 2px;"></span>
          <button class="btn btn-green btn-sm" onclick="servoCalibrate('on')">记开灯</button>
          <button class="btn btn-red btn-sm" onclick="servoCalibrate('off')">记关灯</button>
          <button class="btn btn-purple btn-sm" onclick="servoCalibrate('neutral')">记中立</button>
        </div>
        <div class="section-label" style="margin-top:8px;">偏移量校准</div>
        <div class="inline-form calib-form"><label>中位:</label><input type="number" class="input calib-input" id="inNeutral" value="90" min="0" max="180"><label>开灯偏移:</label><input type="number" class="input calib-input" id="inOnOff" value="-30" min="-90" max="90"><label>关灯偏移:</label><input type="number" class="input calib-input" id="inOffOff" value="30" min="-90" max="90"><button class="btn btn-accent btn-sm" onclick="saveOffsets()">保存</button></div>
      </div>
    </div>

    <!-- Light conditions -->
    <div class="card">
      <div class="card-header"><div class="card-title"><span class="icon">💡</span> 灯光条件</div><button class="btn btn-accent btn-sm" onclick="saveConditions()">保存</button></div>
      <div class="card-body">
        <div class="chk-row"><input type="checkbox" id="chkTime" checked><label for="chkTime">时间条件（日出日落判定）</label></div>
        <div class="chk-row"><input type="checkbox" id="chkLight" checked><label for="chkLight">光照条件（低于阈值判定）</label></div>
        <div class="chk-row"><input type="checkbox" id="chkPresence" checked><label for="chkPresence">人员在场条件（检测判定）</label></div>
        <div class="msg" id="msgCond"></div>
      </div>
    </div>

    <!-- Light threshold + Time fallback (combined) -->
    <div class="card">
      <div class="card-header"><div class="card-title"><span class="icon">☀️</span> 光照 & 时间配置</div></div>
      <div class="card-body">
        <div class="inline-form"><label>光照阈值:</label><input type="number" class="input" id="inThreshold" value="150" min="0" max="65535" step="0.1" style="width:70px;"><span style="font-size:10px;color:var(--text-light);">lux</span><button class="btn btn-accent btn-sm" onclick="saveThreshold()">保存</button><button class="btn btn-outline btn-sm" onclick="useCurrent()">用当前值</button></div>
        <div class="inline-form"><label>白天时段:</label><input type="text" class="input" id="inTimeStart" value="06:00" style="width:52px;"><span style="font-size:11px;">~</span><input type="text" class="input" id="inTimeEnd" value="18:00" style="width:52px;"><button class="btn btn-accent btn-sm" onclick="saveTimeFallback()">保存</button></div>
        <div class="msg" id="msgThreshold"></div>
      </div>
    </div>

    <!-- AC thresholds -->
    <div class="card">
      <div class="card-header"><div class="card-title"><span class="icon">❄️</span> 温度阈值</div><button class="btn btn-accent btn-sm" onclick="saveACThresholds()">保存</button></div>
      <div class="card-body">
        <div class="inline-form"><label>制冷 &gt;</label><input type="number" class="input" id="inCooling" value="28" min="15" max="40" step="0.1" style="width:55px;"><span style="font-size:10px;">°C</span><span style="margin:0 6px;color:var(--border);">|</span><label>制热 &lt;</label><input type="number" class="input" id="inHeating" value="18" min="0" max="30" step="0.1" style="width:55px;"><span style="font-size:10px;">°C</span></div>
        <div class="msg" id="msgAC"></div>
      </div>
    </div>

    <!-- IR -->
    <div class="card">
      <div class="card-header"><div class="card-title"><span class="icon">📡</span> 红外控制</div></div>
      <div class="card-body">
        <div style="font-size:10px;color:var(--text-light);margin-bottom:4px;">输入命令名 → 点击学习 → 10秒内对准接收器按遥控器按键</div>
        <div class="inline-form"><input type="text" class="input" id="irNameInput" placeholder="命令名称（如 ac_on）"><button class="btn btn-accent btn-sm" onclick="irLearn()">学习</button></div>
        <div class="msg" id="irStatus"></div>
        <div class="cmd-list" id="irCmdList"><div style="text-align:center;color:var(--text-subtle);padding:8px 0;font-size:11px;">暂无已学习命令</div></div>
      </div>
    </div>

    <!-- Model -->
    <div class="card">
      <div class="card-header"><div class="card-title"><span class="icon">🧠</span> 模型切换</div></div>
      <div class="card-body">
        <div class="inline-form">
          <select class="input" id="modelSelect" style="flex:1;">
            <option value="yolov8n.pt">v8n Nano 3.2M</option>
            <option value="yolov8s.pt">v8s Small 11.2M</option>
            <option value="yolov8m.pt">v8m Medium 25.9M</option>
            <option value="yolov8l.pt">v8l Large 43.7M</option>
            <option value="yolov8x.pt">v8x XLarge 68.2M</option>
            <option value="yolo11n.pt">v11n Nano 2.6M</option>
            <option value="yolo11s.pt">v11s Small 9.4M</option>
            <option value="yolo11m.pt">v11m Medium 20.1M</option>
            <option value="yolo11l.pt">v11l Large 25.3M</option>
            <option value="yolo11x.pt">v11x XLarge 56.9M</option>
            <option value="yolo26n.pt">v26n Nano 2.4M</option>
            <option value="yolo26s.pt">v26s Small 9.5M</option>
            <option value="yolo26m.pt">v26m Medium 20.4M</option>
            <option value="yolo26l.pt">v26l Large 24.8M</option>
            <option value="yolo26x.pt">v26x XLarge 55.7M</option>
          </select>
          <button class="btn btn-accent btn-sm" onclick="switchModel()">切换</button>
        </div>
        <div class="inline-form"><input type="text" class="input" id="customModel" placeholder="或输入自定义 .pt 路径"></div>
        <div class="msg" id="msgModel"></div>
      </div>
    </div>

    <!-- Interval -->
    <div class="card">
      <div class="card-header"><div class="card-title"><span class="icon">⏱️</span> 检测间隔</div><span class="card-badge" id="intervalLabel">2.0s</span></div>
      <div class="card-body">
        <input type="range" id="intervalSlider" min="0.5" max="10" step="0.5" value="2" style="width:100%;accent-color:var(--accent);"
          oninput="document.getElementById('intervalLabel').textContent=parseFloat(this.value).toFixed(1)+'s'" onchange="applyInterval(this.value)">
        <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text-light);margin-top:2px;"><span>0.5s 精准</span><span>10s 省资源</span></div>
      </div>
    </div>

    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
let socket=null,currentServoAngle=90;
function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('zh-CN',{hour12:false});}
setInterval(updateClock,1000);updateClock();

function connectSocket(){
  socket=io();
  socket.on('connect',()=>{document.getElementById('wsDot').className='status-dot online';document.getElementById('wsLabel').textContent='已连接';socket.emit('request_video');document.getElementById('videoStatus').textContent='● LIVE';document.getElementById('videoStatus').style.color='#4ade80';});
  socket.on('disconnect',()=>{document.getElementById('wsDot').className='status-dot offline';document.getElementById('wsLabel').textContent='断开';document.getElementById('videoStatus').textContent='○ 等待';document.getElementById('videoStatus').style.color='var(--text-subtle)';});
  socket.on('video_frame',d=>{
    var img=document.getElementById('videoImg');
    img.src='data:image/jpeg;base64,'+d.data;
    // 首帧加载后，按实际分辨率调整容器 aspect-ratio，消除黑边
    img.onload=function(){
      if(img.naturalWidth&&img.naturalHeight){
        var container=img.closest('.video-container');
        if(container){container.style.aspectRatio=img.naturalWidth+' / '+img.naturalHeight;}
        img.onload=null;
      }
    };
  });
  socket.on('metrics',d=>{if(d.fps!=null)document.getElementById('streamFps').textContent=d.fps.toFixed(1);if(d.inference_ms!=null)document.getElementById('inferMs').textContent=d.inference_ms.toFixed(0);});
}
connectSocket();

function fetchStatus(){
  fetch('/api/status').then(r=>r.json()).then(d=>{
    if(d.error)return;
    document.getElementById('personCount').textContent=d.person_count||0;
    if(d.temperature!=null)document.getElementById('temperature').textContent=d.temperature.toFixed(1);
    if(d.humidity!=null)document.getElementById('humidity').textContent=d.humidity.toFixed(1);
    if(d.lux!=null)document.getElementById('lux').textContent=Math.round(d.lux);
    var m=(d.mode||'AUTO').toUpperCase();
    document.getElementById('btnAuto').className='mode-btn'+(m==='AUTO'?' active-auto':'');
    document.getElementById('btnManual').className='mode-btn'+(m==='MANUAL'?' active-manual':'');
    if(d.model_name)document.getElementById('modelBadge').textContent=d.model_name;
    if(d.servo){var s=d.servo;if(s.current_angle!=null){currentServoAngle=s.current_angle;document.getElementById('servoAngle').textContent=s.current_angle+'°';document.getElementById('servoSlider').value=s.current_angle;}}
  }).catch(()=>{});
}
setInterval(fetchStatus,2000);fetchStatus();

// Load conditions on page load
fetch('/api/conditions').then(r=>r.json()).then(d=>{
  if(d.time_enabled!=null)document.getElementById('chkTime').checked=d.time_enabled;
  if(d.light_enabled!=null)document.getElementById('chkLight').checked=d.light_enabled;
  if(d.presence_enabled!=null)document.getElementById('chkPresence').checked=d.presence_enabled;
}).catch(()=>{});

function setMode(m){fetch('/api/mode',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:m})}).then(()=>fetchStatus());}
function applyInterval(v){fetch('/api/detection_interval',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({seconds:parseFloat(v)})});}
function updateServoUI(s){
  if(!s)return;
  if(s.current_angle!=null){currentServoAngle=parseInt(s.current_angle);document.getElementById('servoSlider').value=currentServoAngle;document.getElementById('servoAngle').textContent=currentServoAngle+'°';}
}
function servoAction(a){fetch('/api/servo/move',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({angle:currentServoAngle,action:a})}).then(r=>r.json()).then(d=>{if(d.ok){updateServoUI(d.servo);}fetchStatus();});}
function servoMove(a){fetch('/api/servo/move',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({angle:parseInt(a)})}).then(r=>r.json()).then(d=>{if(d.ok)currentServoAngle=parseInt(a);});}
function servoNudge(d){var a=Math.max(0,Math.min(180,currentServoAngle+d));document.getElementById('servoSlider').value=a;document.getElementById('servoAngle').textContent=a+'°';servoMove(a);}
function servoCalibrate(p){var a=parseInt(document.getElementById('servoSlider').value);fetch('/api/servo/calibrate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({preset:p,angle:a})}).then(()=>fetchStatus());}
function saveOffsets(){
  var n=parseInt(document.getElementById('inNeutral').value),on=parseInt(document.getElementById('inOnOff').value),off=parseInt(document.getElementById('inOffOff').value);
  fetch('/api/servo/set_neutral',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({angle:n})});
  fetch('/api/servo/set_on_offset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({offset:on})});
  fetch('/api/servo/set_off_offset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({offset:off})});
}
function saveConditions(){
  var d={time_enabled:document.getElementById('chkTime').checked,light_enabled:document.getElementById('chkLight').checked,presence_enabled:document.getElementById('chkPresence').checked};
  fetch('/api/conditions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(r=>r.json()).then(r=>{document.getElementById('msgCond').textContent=r.ok?'已保存':'错误';document.getElementById('msgCond').className='msg '+(r.ok?'msg-ok':'msg-err');});
}
function saveThreshold(){
  var v=parseFloat(document.getElementById('inThreshold').value);
  fetch('/api/light/threshold',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({threshold:v})}).then(r=>r.json()).then(r=>{document.getElementById('msgThreshold').textContent=r.ok?'阈值已保存':r.error;document.getElementById('msgThreshold').className='msg '+(r.ok?'msg-ok':'msg-err');});
}
function useCurrent(){
  fetch('/api/light/use_current',{method:'POST'}).then(r=>r.json()).then(r=>{if(r.ok){document.getElementById('inThreshold').value=r.dark_threshold.toFixed(1);document.getElementById('msgThreshold').textContent='已设为 '+r.dark_threshold.toFixed(1)+' lux';document.getElementById('msgThreshold').className='msg msg-ok';}else{document.getElementById('msgThreshold').textContent=r.error;document.getElementById('msgThreshold').className='msg msg-err';}});
}
function saveTimeFallback(){
  var s=document.getElementById('inTimeStart').value,e=document.getElementById('inTimeEnd').value;
  fetch('/api/time/fallback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({start:s,end:e})}).then(r=>r.json()).then(r=>{document.getElementById('msgThreshold').textContent=r.ok?'时间已保存':r.error;document.getElementById('msgThreshold').className='msg '+(r.ok?'msg-ok':'msg-err');});
}
function saveACThresholds(){
  var c=parseFloat(document.getElementById('inCooling').value),h=parseFloat(document.getElementById('inHeating').value);
  fetch('/api/ac/thresholds',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cooling:c,heating:h})}).then(r=>r.json()).then(r=>{document.getElementById('msgAC').textContent=r.ok?'已保存':r.error;document.getElementById('msgAC').className='msg '+(r.ok?'msg-ok':'msg-err');});
}
function irLearn(){
  var n=document.getElementById('irNameInput').value.trim();
  if(!n){document.getElementById('irStatus').textContent='请输入命令名称';document.getElementById('irStatus').className='msg msg-err';return;}
  document.getElementById('irStatus').textContent='学习中… 请在10秒内对准接收器按下遥控器按键';document.getElementById('irStatus').className='msg msg-warn';
  fetch('/api/ir/learn',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n})}).then(r=>r.json()).then(d=>{
    if(d.ok){document.getElementById('irStatus').textContent='✓ 学习成功: '+n;document.getElementById('irStatus').className='msg msg-ok';document.getElementById('irNameInput').value='';loadIR();}
    else{document.getElementById('irStatus').textContent='✗ '+(d.error||'学习失败');document.getElementById('irStatus').className='msg msg-err';}
  }).catch(()=>{document.getElementById('irStatus').textContent='请求失败';document.getElementById('irStatus').className='msg msg-err';});
}
function loadIR(){
  fetch('/api/ir/commands').then(r=>r.json()).then(d=>{
    var l=document.getElementById('irCmdList'),c=d.commands||[];
    if(!c.length){l.innerHTML='<div style="text-align:center;color:var(--text-subtle);padding:8px 0;font-size:11px;">暂无已学习命令</div>';return;}
    l.innerHTML=c.map(n=>'<div class="cmd-item"><span>'+esc(n)+'</span><span style="display:flex;gap:3px;"><button class="cmd-btn cmd-btn-send" onclick="irSend(\''+esc(n)+'\')">发送</button><button class="cmd-btn cmd-btn-del" onclick="irDel(\''+esc(n)+'\')">删</button></span></div>').join('');
  });
}
function irSend(n){fetch('/api/ir/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n})}).then(r=>r.json()).then(d=>{document.getElementById('irStatus').textContent=d.ok?'已发送: '+n:(d.error||'失败');document.getElementById('irStatus').className='msg '+(d.ok?'msg-ok':'msg-err');});}
function irDel(n){if(!confirm('删除 "'+n+'"？'))return;fetch('/api/ir/commands/'+encodeURIComponent(n),{method:'DELETE'}).then(r=>r.json()).then(d=>{if(d.ok)loadIR();});}
function switchModel(){
  var c=document.getElementById('customModel').value.trim(),m=c||document.getElementById('modelSelect').value;
  var msg=document.getElementById('msgModel');
  msg.textContent='正在下载/切换: '+m;
  msg.className='msg msg-warn';
  fetch('/api/model/switch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:m})})
    .then(r=>r.json().then(d=>({ok:r.ok,d:d})))
    .then(({ok,d})=>{
      if(ok && d.ok){
        msg.textContent='✓ 已切换: '+m;
        msg.className='msg msg-ok';
        if(d.model)document.getElementById('modelBadge').textContent=d.model;
        if(d.model)document.getElementById('customModel').value='';
        setTimeout(fetchStatus,300);
      }else{
        msg.textContent=d.error||'切换失败';
        msg.className='msg msg-err';
      }
    }).catch(()=>{msg.textContent='请求失败';msg.className='msg msg-err';});
}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
loadIR();
</script>
</body>
